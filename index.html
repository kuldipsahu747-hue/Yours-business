<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Business</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
            scroll-behavior:smooth;
        }

        /* Navbar */
        header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 40px;
            background:#111;
            color:white;
            position:sticky;
            top:0;
        }

        header h2{color:#00c3ff;}

        nav a{
            color:white;
            margin-left:20px;
            text-decoration:none;
        }

        /* Hero Section */
        .hero{
            height:90vh;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            background:linear-gradient(135deg,#00c3ff,#0044ff);
            color:white;
            text-align:center;
        }

        .hero h1{
            font-size:48px;
        }

        .hero button{
            margin-top:20px;
            padding:12px 25px;
            border:none;
            background:white;
            color:#0044ff;
            font-weight:bold;
            cursor:pointer;
            border-radius:5px;
        }

        /* Sections */
        section{
            padding:70px 10%;
            text-align:center;
        }

        h2{
            margin-bottom:20px;
        }

        /* Services */
        .services{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
            justify-content:center;
        }

        .card{
            background:white;
            padding:25px;
            width:260px;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.15);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-10px);
        }

        /* Pricing */
        .pricing{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
            justify-content:center;
        }

        .price-box{
            background:#f4f4f4;
            padding:30px;
            width:250px;
            border-radius:10px;
        }

        .price-box h3{
            color:#0044ff;
        }

        /* Contact */
        input,textarea{
            width:80%;
            padding:12px;
            margin:10px;
            border-radius:5px;
            border:1px solid #ccc;
        }

        button.submit{
            background:#0044ff;
            color:white;
            border:none;
            padding:12px 20px;
            cursor:pointer;
            margin-top:10px;
        }

        /* Footer */
        footer{
            background:#111;
            color:white;
            padding:20px;
            text-align:center;
            margin-top:40px;
        }

        /* Animation */
        .fade{
            opacity:0;
            transform:translateY(40px);
            transition:1s;
        }

        .show{
            opacity:1;
            transform:translateY(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            section{
                padding:50px 5%;
            }
            .services, .pricing{
                flex-direction:column;
                gap:30px;
            }
        }
    </style>
</head>

<body>

<header>
    <h2>StartUpX</h2>
    <nav>
        <a href="#home">Home</a>
        <a href="#services">Services</a>
        <a href="#pricing">Pricing</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
    <h1>Grow Your Business Digitally</h1>
    <p>Smart solutions for modern entrepreneurs</p>
    <button onclick="scrollToSection()">Get Started</button>
</section>

<!-- SERVICES -->
<section id="services" class="fade">
    <h2>Our Services</h2>
    <div class="services">
